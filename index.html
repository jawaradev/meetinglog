<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeetingLog Pro - Attendance System</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .animate-card {
            animation: fadeInUp 0.4s ease-out forwards;
        }
        .filament-shadow { box-shadow: 0px 1px 3px rgba(0, 0, 0, 0.1), 0px 1px 2px rgba(0, 0, 0, 0.06); }
        .lucide { width: 20px; height: 20px; vertical-align: middle; }
    </style>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#f97316',
                        secondary: '#fff7ed',
                    },
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] }
                }
            }
        }
    </script>
</head>
<body class="bg-[#f3f4f6] min-h-screen text-gray-900">

    <header class="bg-white filament-shadow sticky top-0 z-50">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-primary p-2 rounded-lg text-white shadow-lg shadow-orange-200">
                    <i data-lucide="calendar-check"></i>
                </div>
                <h1 class="text-xl font-extrabold tracking-tight">Meeting<span class="text-primary">Log</span></h1>
            </div>
            <nav class="flex bg-gray-100 p-1 rounded-xl">
                <button onclick="switchTab('absensi')" id="btn-absensi" class="px-6 py-2 rounded-lg text-sm font-semibold flex items-center gap-2">
                    <i data-lucide="users"></i> Client
                </button>
                <button onclick="switchTab('admin')" id="btn-admin" class="px-6 py-2 rounded-lg text-sm font-semibold bg-white text-primary shadow-sm flex items-center gap-2">
                    <i data-lucide="layout-dashboard"></i> Dashboard
                </button>
                <button onclick="switchTab('pegawai')" id="btn-pegawai" class="px-6 py-2 rounded-lg text-sm font-semibold flex items-center gap-2">
                    <i data-lucide="users-2"></i> Data Pegawai
                </button>
            </nav>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 max-w-6xl">
        
        <section id="tab-admin" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-3xl filament-shadow border border-gray-100 flex items-center gap-4">
                    <div class="bg-orange-100 p-4 rounded-2xl text-primary">
                        <i data-lucide="user-check" class="w-8 h-8"></i>
                    </div>
                    <div>
                        <p id="count-hadir" class="text-2xl font-bold">0</p>
                        <p class="text-gray-500 text-xs font-medium uppercase tracking-wider">Total Hadir</p>
                    </div>
                </div>
                
                <div class="bg-white p-6 rounded-3xl filament-shadow border border-gray-100 flex flex-col items-center justify-center relative group">
                    <div id="qrcode-container" class="mb-2"></div>
                    <div class="flex items-center gap-2 text-[10px] text-gray-400 font-mono">
                        <i data-lucide="link" class="w-3 h-3"></i>
                        <span id="client-url-text">Menyiapkan Link...</span>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-3xl filament-shadow border border-gray-100 flex flex-col justify-center gap-3">
                    <button onclick="toggleAbsensi(true)" id="btn-buka-presensi" class="w-full bg-primary text-white py-3 rounded-2xl font-bold flex items-center justify-center gap-2 hover:brightness-110 transition-all">
                        <i data-lucide="lock-open"></i> Buka Presensi
                    </button>
                    <button onclick="toggleAbsensi(false)" id="btn-tutup-presensi" class="w-full bg-gray-800 text-white py-3 rounded-2xl font-bold flex items-center justify-center gap-2 hover:bg-black transition-all hidden">
                        <i data-lucide="lock"></i> Tutup Sesi
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="bg-white p-8 rounded-[2rem] filament-shadow">
                    <h3 class="text-xl font-bold mb-6 flex items-center gap-2">
                        <i data-lucide="pen-tool" class="text-primary"></i> Buat Notulensi
                    </h3>
                    <div class="space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div class="relative">
                                <i data-lucide="user" class="absolute left-4 top-4 text-gray-400 w-4 h-4"></i>
                                <input type="text" id="notul-pembicara" placeholder="Pembicara" class="w-full pl-11 p-4 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-orange-400 outline-none">
                            </div>
                            <div class="relative">
                                <i data-lucide="tag" class="absolute left-4 top-4 text-gray-400 w-4 h-4"></i>
                                <input type="text" id="notul-materi" placeholder="Topik" class="w-full pl-11 p-4 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-orange-400 outline-none">
                            </div>
                        </div>
                        <textarea id="notul-isi" placeholder="Poin pembahasan..." class="w-full p-4 bg-gray-50 border-none rounded-2xl h-32 focus:ring-2 focus:ring-orange-400 outline-none"></textarea>
                        <div class="bg-orange-50 rounded-2xl p-2">
                            <textarea id="notul-keputusan" placeholder="Keputusan akhir (opsional)..." class="w-full p-3 bg-transparent border-none focus:ring-0 outline-none h-20 text-orange-900 font-medium"></textarea>
                        </div>
                        <button onclick="simpanNotulensi()" class="w-full bg-primary text-white py-4 rounded-2xl font-bold text-lg shadow-lg shadow-orange-200 flex items-center justify-center gap-2">
                            <i data-lucide="save"></i> Simpan Data
                        </button>
                    </div>
                </div>

                <div class="space-y-4">
                    <h3 class="text-xl font-bold flex items-center gap-2">
                        <i data-lucide="list-checks" class="text-primary"></i> Kehadiran Terbaru
                    </h3>
                    <div id="list-kehadiran" class="space-y-3 max-h-[500px] overflow-y-auto pr-2">
                        </div>
                </div>
            </div>
            
            <div class="mt-12">
                <div class="flex items-center justify-between mb-6">
                    <h3 class="text-xl font-bold flex items-center gap-2">
                        <i data-lucide="archive" class="text-primary"></i> Riwayat Pembahasan
                    </h3>
                    <span id="count-notulensi" class="text-xs bg-gray-200 text-gray-600 px-3 py-1 rounded-full font-medium">
                        Total: 0 Records
                    </span>
                </div>
                <div id="container-notulensi" class="grid grid-cols-1 gap-8">
                    </div>
            </div>

            <div class="mt-10 p-6 bg-red-50 rounded-[2rem] border border-red-100 flex items-center justify-between">
                <div>
                    <h4 class="text-red-800 font-bold flex items-center gap-2">
                        <i data-lucide="alert-triangle" class="w-5 h-5"></i> Danger Zone
                    </h4>
                    <p class="text-red-600/70 text-xs">Hapus seluruh data absensi dan riwayat notulensi secara permanen.</p>
                </div>
                <button onclick="clearDatabase()" class="bg-red-500 hover:bg-red-600 text-white px-6 py-3 rounded-2xl font-bold text-sm transition-all shadow-lg shadow-red-200 flex items-center gap-2">
                    <i data-lucide="trash-2" class="w-4 h-4"></i> Reset Database
                </button>
            </div>
        </section>

        <section id="tab-absensi" class="hidden max-w-4xl mx-auto py-10">
            <div class="text-center mb-10">
                <h2 class="text-3xl font-extrabold text-gray-800">Presensi Peserta</h2>
                <div id="absensi-status-container">
                     <p id="absensi-status" class="mt-2 p-3 rounded-xl bg-gray-100 text-gray-500 text-sm italic border border-gray-200 inline-block">Sesi absensi belum dibuka.</p>
                </div>
            </div>
            <div id="grid-presensi-peserta" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                </div>
        </section>

        <section id="tab-pegawai" class="hidden space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
            <div class="bg-white p-8 rounded-[2rem] filament-shadow border border-gray-100">
                <h3 class="text-xl font-bold mb-6 flex items-center gap-2">
                    <i data-lucide="user-plus" class="text-primary"></i> Registrasi Pegawai
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                    <input id="p-nama" placeholder="Nama Lengkap" class="p-4 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-orange-400 outline-none">
                    <input id="p-username" placeholder="Username" class="p-4 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-orange-400 outline-none">
                    <input id="p-password" type="password" placeholder="Password" class="p-4 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-orange-400 outline-none">
                    <input id="p-jabatan" placeholder="Jabatan" class="p-4 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-orange-400 outline-none">
                </div>
                <button onclick="simpanPegawai()" class="mt-6 w-full md:w-auto bg-primary text-white px-10 py-4 rounded-2xl font-bold shadow-lg shadow-orange-200">
                    Simpan Pegawai
                </button>
            </div>

            <div class="space-y-4">
                <h3 class="text-xl font-bold flex items-center gap-2">
                    <i data-lucide="database" class="text-primary"></i> Database Pegawai
                </h3>
                <div id="list-master-pegawai" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    </div>
            </div>
        </section>

    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
